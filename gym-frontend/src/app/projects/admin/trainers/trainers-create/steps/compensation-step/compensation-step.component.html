<div class="bg-gray-50 overflow-hidden" [formGroup]="formGroup">
  <div class="flex items-center gap-3 px-6 py-4 border-b">
    <mat-icon class="text-primary icon-size-5" svgIcon="banknotes"></mat-icon>
    <span class="text-lg font-semibold tracking-tight">Compensation</span>
  </div>

  <div class="p-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

      <div class="sm:col-span-2 sm:w-1/2">
        <p class="mb-2 text-sm font-medium">Salary type <span class="text-red-500">*</span></p>
        <mat-form-field appearance="outline" class="w-full">
          <mat-select formControlName="salary_type">
            <mat-option *ngFor="let t of SALARY_TYPES" [value]="t.value">{{ t.label }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      @if (showMonthly) {
        <div>
          <p class="mb-2 text-sm font-medium">Monthly salary (OMR)</p>
          <mat-form-field appearance="outline" class="w-full">
            <span matTextPrefix>OMR&nbsp;</span>
            <input matInput type="number" formControlName="monthly_salary" placeholder="350.000" step="0.001" min="0" />
            <mat-error *ngIf="formGroup.get('monthly_salary')!.hasError('min')">Must be a positive amount</mat-error>
          </mat-form-field>
        </div>
      }

      @if (showSessionRate) {
        <div>
          <p class="mb-2 text-sm font-medium">Session rate (OMR)</p>
          <mat-form-field appearance="outline" class="w-full">
            <span matTextPrefix>OMR&nbsp;</span>
            <input matInput type="number" formControlName="session_rate" placeholder="15.000" step="0.001" min="0" />
            <mat-error *ngIf="formGroup.get('session_rate')!.hasError('min')">Must be a positive amount</mat-error>
          </mat-form-field>
        </div>
      }

      @if (showCommission) {
        <div>
          <p class="mb-2 text-sm font-medium">Commission %</p>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput type="number" formControlName="commission_percent" placeholder="20" min="0" max="100" />
            <span matTextSuffix>%</span>
            <mat-error *ngIf="formGroup.get('commission_percent')!.hasError('min')">Must be 0 or more</mat-error>
            <mat-error *ngIf="formGroup.get('commission_percent')!.hasError('max')">Cannot exceed 100%</mat-error>
          </mat-form-field>
        </div>
      }

    </div>
  </div>
</div>
