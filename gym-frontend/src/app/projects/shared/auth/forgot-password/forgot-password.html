<div class="flex flex-auto items-center justify-center p-4 sm:p-8 h-screen overflow-hidden">
  <mat-card class="flex flex-row w-full max-w-5xl h-full max-h-[60vh] overflow-hidden">

    <!-- ── LEFT — Scrollable form ── -->
    <div class="flex w-full md:w-2/5 flex-col flex-shrink-0 h-full overflow-y-auto p-8">

      <!-- Logo -->
      <div class="flex justify-center">
        <app-logo></app-logo>
      </div>

      <!-- Title -->
      <div class="leading-tight mt-8 text-4xl font-extrabold tracking-tight">
        Forgot password
      </div>
      <div class="mt-0.5 font-medium">Fill the form to reset your password</div>

      <!-- Forgot password form -->
      <form class="mt-8" (submit)="forgotPassword($event)">
        <div class="flex flex-col gap-y-4">
          <!-- Email field -->
          <mat-form-field class="w-full">
            <mat-label>Email address</mat-label>
            <input id="email" matInput [formField]="forgotPasswordForm.email" />
            <mat-error>
              @if (
              forgotPasswordForm.email().touched() &&
              forgotPasswordForm.email().invalid()
              ) {
              @for (error of forgotPasswordForm.email().errors(); track error) {
              {{ error.message }}
              }
              }
            </mat-error>
          </mat-form-field>
        </div>

        <!-- Submit button -->
        <button type="submit" matButton="filled" class="mt-6 w-full" [disabled]="forgotPasswordForm().invalid()">
          Reset password
        </button>
      </form>
    </div>

    <!-- ── RIGHT — Fixed image, no scroll ── -->
    <div class="relative hidden md:block md:w-3/5 flex-shrink-0 h-full">
      <img src="/assets/gym_login_man.png" alt="" class="absolute inset-0 h-full w-full object-cover"
        aria-hidden="true" />
    </div>

  </mat-card>
</div>
