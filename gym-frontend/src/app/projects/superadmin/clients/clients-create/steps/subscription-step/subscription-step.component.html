<div class="bg-gray-50 overflow-hidden" [formGroup]="formGroup">
  <!-- Plans grid -->
  <div class="flex items-center gap-3 px-6 py-4 border-b">
    <mat-icon class="text-primary icon-size-5" svgIcon="user" />
    <span class="text-lg font-semibold tracking-tight">Subscriptions</span>
  </div>
  <div class="p-6">
    <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">

      <!-- Free -->
      <label class="cursor-pointer">
        <input type="radio" formControlName="plan" name="plan" value="free" class="hidden peer" />
        <div
          class="p-4 rounded-lg border border-gray-200 bg-white peer-checked:ring-2 peer-checked:ring-primary-600 peer-checked:shadow-md">
          <div class="text-sm font-medium text-secondary">Free</div>
          <div class="text-2xl font-semibold mt-2">$0/mo</div>
          <ul class="mt-3 space-y-2 text-sm text-gray-600">
            <li class="flex items-center gap-2"><svg class="w-4 h-4 text-emerald-600" fill="currentColor"
                viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> 50 members</li>
            <li class="flex items-center gap-2 text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg> AI features</li>
            <li class="flex items-center gap-2 text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg> Workflows</li>
          </ul>
        </div>
      </label>

      <!-- Starter -->
      <label class="cursor-pointer">
        <input type="radio" formControlName="plan" name="plan" value="starter" class="hidden peer" />
        <div
          class="p-4 rounded-lg border border-gray-200 bg-white peer-checked:ring-2 peer-checked:ring-primary-600 peer-checked:shadow-md">
          <div class="text-sm font-medium text-secondary">Starter</div>
          <div class="text-2xl font-semibold mt-2">$49/mo</div>
          <ul class="mt-3 space-y-2 text-sm text-gray-600">
            <li class="flex items-center gap-2"><svg class="w-4 h-4 text-emerald-600" fill="currentColor"
                viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> 200 members</li>
            <li class="flex items-center gap-2 text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg> AI features</li>
            <li class="flex items-center gap-2 text-emerald-600"><svg class="w-4 h-4 text-emerald-600"
                fill="currentColor" viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> Basic workflows</li>
          </ul>
        </div>
      </label>

      <!-- Pro -->
      <label class="cursor-pointer">
        <input type="radio" formControlName="plan" name="plan" value="pro" class="hidden peer" />
        <div
          class="p-4 rounded-lg border border-gray-200 bg-white peer-checked:ring-2 peer-checked:ring-primary-600 peer-checked:shadow-md">
          <div class="text-sm font-medium text-secondary">Pro</div>
          <div class="text-2xl font-semibold mt-2">$149/mo</div>
          <ul class="mt-3 space-y-2 text-sm text-gray-600">
            <li class="flex items-center gap-2"><svg class="w-4 h-4 text-emerald-600" fill="currentColor"
                viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> 1000 members</li>
            <li class="flex items-center gap-2"><svg class="w-4 h-4 text-emerald-600" fill="currentColor"
                viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> AI features</li>
            <li class="flex items-center gap-2 text-emerald-600"><svg class="w-4 h-4 text-emerald-600"
                fill="currentColor" viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> Full workflows</li>
          </ul>
        </div>
      </label>

      <!-- Enterprise -->
      <label class="cursor-pointer">
        <input type="radio" formControlName="plan" name="plan" value="enterprise" class="hidden peer" />
        <div
          class="p-4 rounded-lg border border-gray-200 bg-white peer-checked:ring-2 peer-checked:ring-primary-600 peer-checked:shadow-md">
          <div class="text-sm font-medium text-secondary">Enterprise</div>
          <div class="text-2xl font-semibold mt-2">Custom</div>
          <ul class="mt-3 space-y-2 text-sm text-gray-600">
            <li class="flex items-center gap-2 text-emerald-600"><svg class="w-4 h-4 text-emerald-600"
                fill="currentColor" viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> Unlimited</li>
            <li class="flex items-center gap-2 text-emerald-600"><svg class="w-4 h-4 text-emerald-600"
                fill="currentColor" viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> AI features</li>
            <li class="flex items-center gap-2 text-emerald-600"><svg class="w-4 h-4 text-emerald-600"
                fill="currentColor" viewBox="0 0 24 24">
                <path d="M9 12.75L11.25 15 15 9.75" />
              </svg> Custom workflows</li>
          </ul>
        </div>
      </label>

    </div>

    <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <mat-slide-toggle  (change)="onTrialChange()"  color="primary">Start with a trial period</mat-slide-toggle>
      </div>

      <div class="w-40">
        <mat-form-field appearance="outline" class="w-full">
          <mat-select placeholder="Trial duration" formControlName="trialEndsAt" 
          (selectionChange)="updateTrialEndsAt($event.value)"
           >
            <mat-option value="7">7 days</mat-option>
            <mat-option value="14">14 days</mat-option>
            <mat-option value="30">30 days</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

  </div>
</div>
