<div class="w-full max-w-md">

  <!-- Header -->
  <div class="flex items-start gap-4 px-6 pt-6 pb-4">
    <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center"
      [ngClass]="config.iconBg">
      <mat-icon [svgIcon]="config.icon" class="!w-5 !h-5 !text-xl" [ngClass]="config.iconColor" />
    </div>
    <div class="flex-1 min-w-0">
      <h2 class="text-base font-semibold text-gray-900 leading-snug">{{ title }}</h2>
      <p class="mt-1 text-sm text-gray-500 leading-relaxed">{{ message }}</p>
    </div>
    <button type="button" (click)="cancel()"
      class="flex-shrink-0 text-gray-400 hover:text-gray-500 cursor-pointer transition-colors">
      <mat-icon svgIcon="x" class="!w-4 !h-4 !text-base" />
    </button>
  </div>

  <!-- Body -->
  <div class="px-6 pb-2 flex flex-col gap-4" [formGroup]="form">

    <!-- Reason textarea -->
    @if (data.showReason) {
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-gray-700">
        {{ reasonLabel }}
        @if (!data.reasonRequired) {
        <span class="text-gray-400 font-normal ml-1">(optional)</span>
        }
      </label>
      <textarea formControlName="reason" rows="3"
        [placeholder]="data.reasonPlaceholder ?? 'Provide a reason…'"
        class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md bg-white resize-none
               focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
               placeholder:text-gray-400"
        [class.border-red-400]="form.get('reason')?.invalid && form.get('reason')?.touched">
      </textarea>
      @if (form.get('reason')?.invalid && form.get('reason')?.touched) {
      <p class="text-xs text-red-500">Reason is required.</p>
      }
    </div>
    }

    <!-- Acknowledge checkbox -->
    @if (data.requireAcknowledge) {
    <label class="flex items-start gap-2.5 cursor-pointer group">
      <input type="checkbox" formControlName="acknowledged"
        class="mt-0.5 w-4 h-4 rounded border-gray-300 text-primary accent-primary cursor-pointer" />
      <span class="text-sm text-gray-600 group-hover:text-gray-800 transition-colors leading-relaxed">
        {{ acknowledgeLabel }}
      </span>
    </label>
    @if (form.get('acknowledged')?.invalid && form.get('acknowledged')?.touched) {
    <p class="-mt-2 text-xs text-red-500">Please acknowledge before proceeding.</p>
    }
    }

  </div>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-gray-100 mt-2">
    <button type="button" (click)="cancel()"
      class="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300
             rounded-md hover:bg-gray-50 transition-colors cursor-pointer">
      Cancel
    </button>
    <button type="button" (click)="confirm()" [disabled]="isSubmitting"
      class="px-4 py-2 text-sm font-medium rounded-md transition-colors cursor-pointer
             disabled:opacity-50 disabled:cursor-not-allowed"
      [ngClass]="config.confirmClasses">
      @if (isSubmitting) {
      <span class="flex items-center gap-1.5">
        <svg class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10" />
        </svg>
        Processing…
      </span>
      } @else {
      {{ confirmLabel }}
      }
    </button>
  </div>

</div>
