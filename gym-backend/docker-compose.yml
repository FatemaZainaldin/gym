version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: badan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-gym_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - badan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: badan_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - badan_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: badan_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — NestJS sends emails here
      - "8025:8025"   # Web UI — open http://localhost:8025 to read emails
    volumes:
      - badan_mailhog_data:/maildir

  nestjs:
    build:
      context: ./gym-backend
      dockerfile: Dockerfile
    container_name: badan_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./gym-backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./gym-backend:/app
      - /app/node_modules          # prevent host node_modules overwriting container's

volumes:
  badan_postgres_data:
  badan_redis_data:
  badan_mailhog_data: